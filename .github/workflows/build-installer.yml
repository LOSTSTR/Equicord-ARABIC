name: Build Installer EXE

on:
    push:
        branches: [main]
        paths:
            - "installer/installer.template.ps1"
            - "installer/icon.ico"
            - "installer/logo.png"
            - ".github/workflows/build-installer.yml"
    release:
        types: [created]
    workflow_dispatch:
    workflow_call:

permissions:
    contents: write

jobs:
    build:
        name: Build EquicordArabicSetup.exe
        runs-on: windows-latest

        permissions:
            contents: write

        steps:
            - uses: actions/checkout@v6
              with:
                  fetch-depth: 0

            - name: Read version
              id: ver
              shell: bash
              run: |
                  V=$(jq -r .version < package.json)
                  echo "version=$V" >> "$GITHUB_OUTPUT"

            - name: Generate installer PS1
              shell: pwsh
              run: |
                  $v        = "${{ steps.ver.outputs.version }}"
                  $template = Get-Content "installer\installer.template.ps1" -Raw -Encoding UTF8
                  $ps1      = $template -replace '\{\{INSTALLER_VERSION\}\}', $v
                  $outPs1   = "${{ github.workspace }}\installer\EquicordArabic-Installer.ps1"
                  [System.IO.File]::WriteAllText($outPs1, $ps1, [System.Text.Encoding]::UTF8)
                  $lines = ($ps1 -split "`n").Count
                  Write-Host "Generated installer PS1 for v$v ($lines lines)"

            - name: Generate icon.ico
              shell: pwsh
              run: |
                  Add-Type -AssemblyName System.Drawing

                  $logoPath = "installer\logo.png"
                  $icoPath  = "installer\icon.ico"
                  $sizes    = @(256, 128, 64, 48, 32, 16)

                  if (Test-Path $logoPath) {
                      $src  = [System.Drawing.Image]::FromFile((Resolve-Path $logoPath))
                      $side = [Math]::Min($src.Width, $src.Height)
                      $crop = New-Object System.Drawing.Rectangle(
                          ($src.Width - $side)/2, ($src.Height - $side)/2, $side, $side)
                      $base = New-Object System.Drawing.Bitmap($side, $side,
                          [System.Drawing.Imaging.PixelFormat]::Format32bppArgb)
                      $g = [System.Drawing.Graphics]::FromImage($base)
                      $g.DrawImage($src, [System.Drawing.Rectangle]::new(0,0,$side,$side),
                          $crop, [System.Drawing.GraphicsUnit]::Pixel)
                      $g.Dispose(); $src.Dispose()
                  } else {
                      Write-Host "logo.png not found - generating EA placeholder"
                      $base = New-Object System.Drawing.Bitmap(256, 256,
                          [System.Drawing.Imaging.PixelFormat]::Format32bppArgb)
                      $g = [System.Drawing.Graphics]::FromImage($base)
                      $g.SmoothingMode = [System.Drawing.Drawing2D.SmoothingMode]::AntiAlias
                      $g.Clear([System.Drawing.Color]::FromArgb(15,15,15))
                      $pen = New-Object System.Drawing.Pen(
                          [System.Drawing.Color]::FromArgb(212,175,55), 10)
                      $g.DrawEllipse($pen, 12, 12, 232, 232); $pen.Dispose()
                      $font  = New-Object System.Drawing.Font("Segoe UI", 90,
                          [System.Drawing.FontStyle]::Bold)
                      $brush = New-Object System.Drawing.SolidBrush(
                          [System.Drawing.Color]::FromArgb(212,175,55))
                      $fmt = New-Object System.Drawing.StringFormat
                      $fmt.Alignment     = [System.Drawing.StringAlignment]::Center
                      $fmt.LineAlignment = [System.Drawing.StringAlignment]::Center
                      $g.DrawString("EA", $font, $brush,
                          (New-Object System.Drawing.RectangleF(0,0,256,256)), $fmt)
                      $font.Dispose(); $brush.Dispose(); $g.Dispose()
                  }

                  $stream = New-Object System.IO.MemoryStream
                  $writer = New-Object System.IO.BinaryWriter($stream)
                  $writer.Write([uint16]0); $writer.Write([uint16]1)
                  $writer.Write([uint16]$sizes.Length)
                  $dirStart = $stream.Position
                  $stream.Seek($dirStart + 16*$sizes.Length,
                      [System.IO.SeekOrigin]::Begin) | Out-Null
                  $offsets=@(); $lengths=@()
                  foreach ($sz in $sizes) {
                      $bmp = New-Object System.Drawing.Bitmap($sz,$sz,
                          [System.Drawing.Imaging.PixelFormat]::Format32bppArgb)
                      $gr  = [System.Drawing.Graphics]::FromImage($bmp)
                      $gr.InterpolationMode =
                          [System.Drawing.Drawing2D.InterpolationMode]::HighQualityBicubic
                      $gr.DrawImage($base,0,0,$sz,$sz); $gr.Dispose()
                      $pms = New-Object System.IO.MemoryStream
                      $bmp.Save($pms,[System.Drawing.Imaging.ImageFormat]::Png); $bmp.Dispose()
                      $bytes=$pms.ToArray(); $pms.Dispose()
                      $offsets+=[int]$stream.Position; $lengths+=$bytes.Length
                      $writer.Write($bytes)
                  }
                  $stream.Seek($dirStart,[System.IO.SeekOrigin]::Begin)|Out-Null
                  for ($i=0;$i -lt $sizes.Length;$i++) {
                      $sz=$sizes[$i]
                      $writer.Write([byte]$(if($sz-ge 256){0}else{$sz}))
                      $writer.Write([byte]$(if($sz-ge 256){0}else{$sz}))
                      $writer.Write([byte]0); $writer.Write([byte]0)
                      $writer.Write([uint16]1); $writer.Write([uint16]32)
                      $writer.Write([uint32]$lengths[$i])
                      $writer.Write([uint32]$offsets[$i])
                  }
                  $writer.Flush()
                  [System.IO.File]::WriteAllBytes($icoPath,$stream.ToArray())
                  $stream.Dispose(); $base.Dispose()
                  Write-Host "icon.ico: $([math]::Round((Get-Item $icoPath).Length/1KB,1)) KB"

            - name: Install ps2exe
              shell: pwsh
              run: |
                  Set-PSRepository PSGallery -InstallationPolicy Trusted
                  Install-Module ps2exe -Force -Scope CurrentUser -AllowClobber

            - name: Compile EXE
              id: compile
              shell: pwsh
              run: |
                  $v    = "${{ steps.ver.outputs.version }}"
                  $out  = "installer\EquicordArabicSetup.exe"
                  $ver4 = if (($v -split '\.').Count -lt 4) { "$v.0" } else { $v }

                  Invoke-ps2exe `
                      -InputFile   "installer\EquicordArabic-Installer.ps1" `
                      -OutputFile  $out `
                      -IconFile    "installer\icon.ico" `
                      -Title       "Equicord-ARABIC Installer" `
                      -Description "Secure Installer for Equicord-ARABIC Client" `
                      -Company     "LOSTSTR Digital Branding" `
                      -Product     "Equicord-ARABIC" `
                      -Version     $ver4 `
                      -Copyright   "© 2026 LOSTSTR - Equicord-ARABIC" `
                      -NoConsole   `
                      -RequireAdmin

                  $size = [math]::Round((Get-Item $out).Length/1MB,1)
                  Write-Host "EXE built: $out  ($size MB)"
                  echo "exe_path=$out" >> $env:GITHUB_OUTPUT

            - name: Upload artifact
              uses: actions/upload-artifact@v4
              with:
                  name: EquicordArabicSetup
                  path: installer/EquicordArabicSetup.exe
                  retention-days: 60

            - name: Upload to v1.0.0-stable release
              if: github.event_name == 'push' || github.event_name == 'workflow_call'
              shell: bash
              env:
                  GITHUB_TOKEN: ${{ secrets.ETOKEN }}
              run: |
                  V="${{ steps.ver.outputs.version }}"
                  if gh release view v1.0.0-stable >/dev/null 2>&1; then
                    echo "Release v1.0.0-stable exists — updating title"
                    gh release edit v1.0.0-stable --title "Equicord-ARABIC $V"
                  else
                    echo "Creating release v1.0.0-stable"
                    gh release create v1.0.0-stable \
                        --target main \
                        --title "Equicord-ARABIC $V" \
                        --notes "Official Arabic Release"
                  fi
                  gh release upload v1.0.0-stable installer/EquicordArabicSetup.exe --clobber
                  echo "Uploaded EquicordArabicSetup.exe to release v1.0.0-stable"
