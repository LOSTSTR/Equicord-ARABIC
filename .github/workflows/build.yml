name: Release
on:
    push:
        branches:
            - main

env:
    FORCE_COLOR: true
    GITHUB_TOKEN: ${{ secrets.ETOKEN }}
    EQUICORD_REMOTE: LOSTSTR/Equicord-ARABIC

permissions:
    contents: write

jobs:
    Validate:
        name: Validate Build
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v6

            - uses: pnpm/action-setup@v6

            - name: Use Node.js 24
              uses: actions/setup-node@v6
              with:
                  node-version: 24
                  cache: "pnpm"

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Lint & type-check
              run: pnpm test

    Build:
        name: Build Equicord
        needs: Validate
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v6

            - uses: pnpm/action-setup@v6

            - name: Use Node.js 24
              uses: actions/setup-node@v6
              with:
                  node-version: 24
                  cache: "pnpm"

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Build web
              run: pnpm buildWebStandalone

            - name: Build
              run: pnpm buildStandalone

            - name: Generate plugin lists
              run: |
                  pnpm generatePluginJson dist/plugins.json
                  pnpm generateEquicordPluginJson dist/equicordplugins.json
                  pnpm generateVencordPluginJson dist/vencordplugins.json
                  pnpm generateDevsList dist/devs.json

            - name: Collect files to be released
              run: |
                  mkdir -p dist/release
                  # Only desktop.asar — required by the HTTP auto-updater (http.ts).
                  # Built at dist/desktop.asar by pnpm buildStandalone.
                  # The EXE installer is uploaded separately by build-installer.yml.
                  cp dist/desktop.asar dist/release/
                  find dist/release -size 0 -delete

            - name: Upload Equicord Stable
              if: ${{ vars.ACT == 'false' }}
              run: |
                  HASH=$(git rev-parse --short HEAD)
                  # Create the `v1.0.0-stable` release if it doesn't exist, then update its title
                  # to include the current commit hash. The HTTP updater reads the hash from
                  # the release name to decide whether a new update is available.
                  gh release create v1.0.0-stable \
                      --target main \
                      --title "Equicord-ARABIC $HASH" \
                      --notes "Official Arabic Release" 2>/dev/null || \
                  gh release edit v1.0.0-stable \
                      --title "Equicord-ARABIC $HASH" \
                      --notes "Official Arabic Release"
                  gh release upload v1.0.0-stable --clobber dist/release/*.asar

            # ── Equicord-ARABIC: trigger installer build after ASAR release ──
            - name: Trigger installer build workflows
              if: ${{ vars.ACT == 'false' }}
              run: |
                  gh workflow run build-installer.yml --ref main
                  gh workflow run build-installer-macos.yml --ref main
                  gh workflow run build-installer-windows-cli.yml --ref main
              env:
                  GITHUB_TOKEN: ${{ secrets.ETOKEN }}
